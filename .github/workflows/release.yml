name: Build & Publish Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            target: x86_64-pc-windows-msvc
            binary: lumina.exe
            artifact: lumina-windows.exe
            npm_dir: win32-x64
            npm_bin: lumina.exe

          - os: ubuntu-latest
            platform: linux-x64
            target: x86_64-unknown-linux-gnu
            binary: lumina
            artifact: lumina-linux-x64
            npm_dir: linux-x64
            npm_bin: lumina

          - os: macos-latest
            platform: macos-arm64
            target: aarch64-apple-darwin
            binary: lumina
            artifact: lumina-macos-arm64
            npm_dir: darwin-arm64
            npm_bin: lumina

          - os: macos-12
            platform: macos-x64
            target: x86_64-apple-darwin
            binary: lumina
            artifact: lumina-macos-x64
            npm_dir: darwin-x64
            npm_bin: lumina

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}
          ls -lh ${{ matrix.artifact }}

      # ── Smoke tests (skip for cross-compiled binaries) ──
      - name: Smoke test — version
        if: ${{ !matrix.cross }}
        shell: bash
        run: ./${{ matrix.artifact }} --version

      - name: Smoke test — help
        if: ${{ !matrix.cross }}
        shell: bash
        run: ./${{ matrix.artifact }} --help

      # ── Prepare npm platform package ──
      - name: Prepare platform package
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.npm_dir }}/bin
          cp ${{ matrix.artifact }} npm/${{ matrix.npm_dir }}/bin/${{ matrix.npm_bin }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release'
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm_dir }}
          path: npm/${{ matrix.npm_dir }}/

      - name: Upload binary artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Publish to npm ──
  publish-npm:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Download all platform package artifacts
      - name: Download win32-x64
        uses: actions/download-artifact@v4
        with:
          name: npm-win32-x64
          path: npm/win32-x64/

      - name: Download linux-x64
        uses: actions/download-artifact@v4
        with:
          name: npm-linux-x64
          path: npm/linux-x64/

      - name: Download darwin-arm64
        uses: actions/download-artifact@v4
        with:
          name: npm-darwin-arm64
          path: npm/darwin-arm64/

      - name: Download darwin-x64
        uses: actions/download-artifact@v4
        with:
          name: npm-darwin-x64
          path: npm/darwin-x64/

      # Verify every platform package contains a binary before publishing
      - name: Verify platform package contents
        run: |
          FAIL=0
          for dir in win32-x64 darwin-arm64 darwin-x64 linux-x64; do
            if [ ! -d "npm/$dir/bin" ] || [ -z "$(ls -A npm/$dir/bin/ 2>/dev/null)" ]; then
              echo "FATAL: npm/$dir/bin/ is missing or empty"
              FAIL=1
            else
              echo "OK: npm/$dir/bin/ →"
              ls -lh "npm/$dir/bin/"
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::One or more platform packages are missing binaries. Aborting publish."
            exit 1
          fi

      # Publish platform packages (fail the job if any publish fails)
      - name: Publish @lumina-search/win32-x64
        working-directory: npm/win32-x64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lumina-search/linux-x64
        working-directory: npm/linux-x64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lumina-search/darwin-arm64
        working-directory: npm/darwin-arm64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lumina-search/darwin-x64
        working-directory: npm/darwin-x64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Pre-publish smoke test: install platform + main from local tarballs
      # into a temp project so all resolution is fully offline (no registry hits)
      - name: Pre-publish smoke test — local tarball install
        run: |
          PLATFORM_TGZ="/tmp/$(cd npm/linux-x64 && npm pack --pack-destination /tmp 2>/dev/null | tail -1)"
          MAIN_TGZ="/tmp/$(npm pack --pack-destination /tmp 2>/dev/null | tail -1)"
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"
          npm init -y > /dev/null 2>&1
          npm install "$PLATFORM_TGZ" "$MAIN_TGZ"
          npx lumina --version
          rm -rf "$SMOKE_DIR"

      # Publish the main package only after all platform packages succeeded
      - name: Publish lumina-search
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
