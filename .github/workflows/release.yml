name: Build & Publish Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            target: x86_64-pc-windows-msvc
            binary: lumina.exe
            artifact: lumina-windows.exe
            npm_dir: win32-x64
            npm_bin: lumina.exe

          - os: ubuntu-latest
            platform: linux-x64
            target: x86_64-unknown-linux-gnu
            binary: lumina
            artifact: lumina-linux-x64
            npm_dir: linux-x64
            npm_bin: lumina

          - os: ubuntu-latest
            platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            binary: lumina
            artifact: lumina-linux-arm64
            npm_dir: linux-arm64
            npm_bin: lumina
            cross: true

          - os: macos-latest
            platform: macos-arm64
            target: aarch64-apple-darwin
            binary: lumina
            artifact: lumina-macos-arm64
            npm_dir: darwin-arm64
            npm_bin: lumina

          - os: macos-13
            platform: macos-x64
            target: x86_64-apple-darwin
            binary: lumina
            artifact: lumina-macos-x64
            npm_dir: darwin-x64
            npm_bin: lumina

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install protoc (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}
          ls -lh ${{ matrix.artifact }}

      # ── Smoke tests (skip for cross-compiled binaries) ──
      - name: Smoke test — version
        if: ${{ !matrix.cross }}
        shell: bash
        run: ./${{ matrix.artifact }} --version

      - name: Smoke test — help
        if: ${{ !matrix.cross }}
        shell: bash
        run: ./${{ matrix.artifact }} --help

      # ── Prepare npm platform package ──
      - name: Prepare platform package
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.npm_dir }}/bin
          cp ${{ matrix.artifact }} npm/${{ matrix.npm_dir }}/bin/${{ matrix.npm_bin }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release'
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm_dir }}
          path: npm/${{ matrix.npm_dir }}/

      - name: Upload binary artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Publish to npm ──
  publish-npm:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Download all platform package artifacts
      - name: Download win32-x64
        uses: actions/download-artifact@v4
        with:
          name: npm-win32-x64
          path: npm/win32-x64/

      - name: Download linux-x64
        uses: actions/download-artifact@v4
        with:
          name: npm-linux-x64
          path: npm/linux-x64/

      - name: Download linux-arm64
        uses: actions/download-artifact@v4
        with:
          name: npm-linux-arm64
          path: npm/linux-arm64/

      - name: Download darwin-arm64
        uses: actions/download-artifact@v4
        with:
          name: npm-darwin-arm64
          path: npm/darwin-arm64/

      - name: Download darwin-x64
        uses: actions/download-artifact@v4
        with:
          name: npm-darwin-x64
          path: npm/darwin-x64/

      - name: List platform packages
        run: |
          echo "=== Platform packages ==="
          for dir in npm/*/; do
            echo "--- $dir ---"
            ls -lhR "$dir"
          done

      # Publish each platform package
      - name: Publish @lumina-search/win32-x64
        working-directory: npm/win32-x64
        run: npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lumina-search/linux-x64
        working-directory: npm/linux-x64
        run: npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lumina-search/linux-arm64
        working-directory: npm/linux-arm64
        run: npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lumina-search/darwin-arm64
        working-directory: npm/darwin-arm64
        run: npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lumina-search/darwin-x64
        working-directory: npm/darwin-x64
        run: npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish the main package last
      - name: Publish lumina-search
        run: npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Smoke test: install from npm ──
      - name: Smoke test — npm install
        run: |
          npm install -g lumina-search || true
          lumina --version || echo "Binary not available for this CI platform (expected)"
